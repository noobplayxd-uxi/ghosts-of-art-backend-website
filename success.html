<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Purchase Successful | Ghosts of Art</title>
  <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@600&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
  
  <style>
    body {
      font-family: 'Inter', sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      margin: 0;
      background: radial-gradient(circle at center, #1a1a1a 0%, #000000 100%);
      color: white;
      text-align: center;
      overflow: hidden;
    }

    .success-card {
      background: rgba(255, 255, 255, 0.03);
      padding: 60px;
      border-radius: 30px;
      border: 1px solid rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(15px);
      box-shadow: 0 30px 60px rgba(0,0,0,0.7);
      max-width: 500px;
      animation: fadeIn 1s ease-out;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    h1 {
      font-family: 'Dancing Script', cursive;
      font-size: 3.5rem;
      margin-bottom: 5px;
      color: #00ffcc; /* Matches your checkout theme */
      text-shadow: 0 0 20px rgba(0, 255, 204, 0.2);
    }

    p { font-size: 1rem; color: #888; margin: 10px 0; }

    .payment-info {
      margin-top: 25px;
      padding: 15px;
      background: rgba(0, 0, 0, 0.3);
      border-radius: 12px;
      border: 1px solid #222;
    }

    .payment-id {
      font-family: 'Courier New', monospace;
      color: #00ffcc;
      font-weight: bold;
      letter-spacing: 1px;
    }

    button {
      margin-top: 40px;
      padding: 18px 45px;
      font-size: 0.9rem;
      font-weight: 600;
      border: none;
      border-radius: 50px;
      background: #00ffcc; /* Mint/Cyan to match brand */
      color: #000;
      cursor: pointer;
      transition: 0.4s;
      text-transform: uppercase;
      letter-spacing: 2px;
    }

    button:hover {
      background: #05d4ab;
      transform: scale(1.05);
      box-shadow: 0 10px 20px rgba(0, 255, 204, 0.2);
    }

    .check-icon {
        font-size: 60px;
        color: #00ffcc;
        margin-bottom: 10px;
        filter: drop-shadow(0 0 10px rgba(0, 255, 204, 0.4));
    }
  </style>
</head>
<body>

<div class="success-card">
  <div class="check-icon">✓</div>
  <h1>Order Placed</h1>
  <p>Thank you for supporting the gallery.</p>
  
  <div class="payment-info" id="payment-detail" style="display:none;">
    <p style="font-size: 0.8em; margin-bottom: 5px;">TRANSACTION ID</p>
    <span class="payment-id" id="pid">N/A</span>
  </div>

  <button onclick="goHome()">Back to Store</button>
</div>

<script>
  window.onload = function() {
      // 1. DATA CLEANUP: Clear the cart since the order is paid
      localStorage.removeItem("ghostCart");
      localStorage.removeItem("ghostSecurePack");

      // 2. RETRIEVE ID: Get the ID passed from checkout.js
      const params = new URLSearchParams(window.location.search);
      const paymentId = params.get("order_id") || params.get("payment_id");
      
      if(paymentId) {
          document.getElementById("payment-detail").style.display = "block";
          document.getElementById("pid").textContent = paymentId;
      }
  };

  function goHome(){
      window.location.href = "store.html"; 
  }
</script>

</body>
</html>
