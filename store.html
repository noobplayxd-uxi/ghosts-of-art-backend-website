<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Ghosts of Art | Store</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { 
            font-family: 'Roboto', sans-serif; margin:0; padding:0;
            background: radial-gradient(circle at center, #2c2c2c 0%, #000000 100%);
            background-attachment: fixed;
            color:white;
        }

        /* --- NEW: TOP NAVIGATION & USER PROFILE --- */
        .top-nav {
            display: flex;
            justify-content: flex-end;
            align-items: center;
            padding: 15px 40px;
            background: rgba(0,0,0,0.3);
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }

        .user-profile {
            display: flex;
            align-items: center;
            gap: 12px;
            background: rgba(255,255,255,0.05);
            padding: 8px 18px;
            border-radius: 50px;
            border: 1px solid rgba(255,255,255,0.1);
            cursor: pointer;
            transition: 0.3s;
            text-decoration: none;
            color: white;
        }

        .user-profile:hover {
            background: rgba(255,255,255,0.15);
            border-color: #00ffcc;
        }

        .user-avatar {
            width: 24px;
            height: 24px;
            background: #00ffcc;
            color: #000;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-weight: bold;
            font-size: 0.8em;
        }

        #display-username {
            font-size: 0.9em;
            font-weight: 500;
            letter-spacing: 0.5px;
        }

        header { text-align:center; padding:20px 20px 40px; font-size:2.5em; letter-spacing: 2px; text-transform: uppercase; }
        
        .container { display:flex; padding:20px; max-width: 1200px; margin: 0 auto; }
        
        /* SIDEBAR STYLE */
        .sidebar { width:240px; margin-right:30px; background: rgba(255,255,255,0.05); padding: 20px; border-radius: 16px; height: fit-content; border: 1px solid rgba(255,255,255,0.1); }
        .sidebar h3 { margin-bottom:15px; color:#fff; font-size: 1em; text-transform: uppercase; letter-spacing: 1px; border-bottom: 1px solid #444; padding-bottom: 8px; }
        
        .category-container { display: flex; flex-direction: column; gap: 10px; margin-bottom: 25px; }

        .category-item { 
            padding: 10px 15px; 
            cursor: pointer; 
            color: #aaa; 
            transition: 0.3s; 
            font-size: 0.85em; 
            background: rgba(255,255,255,0.05);
            border-radius: 50px; 
            border: 1px solid transparent;
            text-align: center;
        }

        .category-item:hover { 
            color: #fff; 
            background: rgba(255,255,255,0.15);
            border-color: rgba(255,255,255,0.3);
        }

        .category-item.active {
            background: white;
            color: black;
            font-weight: bold;
            box-shadow: 0 4px 15px rgba(255,255,255,0.2);
        }

        .community-btn {
            width: 100%;
            margin-top: 20px;
            padding: 12px;
            background: transparent;
            color: #fff;
            border: 1px dashed #666;
            border-radius: 12px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s;
            text-transform: uppercase;
            font-size: 0.8em;
            letter-spacing: 1px;
        }
        .community-btn:hover {
            background: rgba(255,255,255,0.1);
            border-color: #fff;
        }

        .main { flex:1; }
        #search-bar { width:100%; padding:15px; border-radius:12px; border: 1px solid #444; margin-bottom:25px; background: rgba(255,255,255,0.08); color: white; outline: none; transition: 0.3s; box-sizing: border-box;}
        #search-bar:focus { border-color: #fff; background: rgba(255,255,255,0.12); }
        
        .products { display:grid; grid-template-columns:repeat(auto-fill,minmax(200px,1fr)); gap:25px; }
        .product { background: rgba(255,255,255,0.03); padding:15px; border-radius:12px; text-align:center; transition: 0.4s; border: 1px solid rgba(255,255,255,0.05); position: relative; }
        .product:hover { transform: translateY(-10px); border-color: rgba(255,255,255,0.4); }
        .product img { width:100%; height:180px; object-fit:cover; border-radius:8px; margin-bottom:10px; }
        .product button { width: 100%; padding: 10px; background: white; border: none; border-radius: 6px; color: black; cursor: pointer; font-weight: bold; transition: 0.3s; }
        .product button:hover { background: #ddd; }

        .cart-floating {
            position: fixed; right: 30px; bottom: 30px;
            background: white; color: black;
            padding: 15px 25px; border-radius: 50px;
            cursor: pointer; font-weight: bold;
            box-shadow: 0 10px 40px rgba(0,0,0,0.6);
            display: flex; align-items: center; gap: 12px;
            transition: 0.3s;
            z-index: 1000;
        }
        .cart-floating:hover { transform: scale(1.1); }
        #total-items-badge { background: #ff3333; color: white; min-width: 20px; height: 20px; padding: 2px 6px; border-radius: 50%; font-size: 0.75em; display: flex; justify-content: center; align-items: center; }

        .filter-group { display: flex; gap: 5px; margin-top: 10px; }
        .filter-group input { width: 50%; background: #222; color: white; border: 1px solid #444; padding: 8px; border-radius: 8px; outline: none; }
    </style>
</head>
<body>

<nav class="top-nav">
    <a href="account.html" class="user-profile">
        <div class="user-avatar" id="user-initial">?</div>
        <span id="display-username">Loading...</span>
    </a>
</nav>

<header>Ghosts of Art</header>

<div class="container">
    <div class="sidebar">
        <h3>Categories</h3>
        <div class="category-container">
            <div class="category-item active" onclick="handleCategoryClick(this, 'All')">Show All</div>
            <div class="category-item" onclick="handleCategoryClick(this, 'Low')">Low Level</div>
            <div class="category-item" onclick="handleCategoryClick(this, 'Medium')">Medium Level</div>
            <div class="category-item" onclick="handleCategoryClick(this, 'High')">High Level</div>
            <div class="category-item" onclick="handleCategoryClick(this, 'Canvas')">Canvas Drawing</div>
            <div class="category-item" onclick="handleCategoryClick(this, 'Manga')">Manga Books</div>
        </div>

        <h3>Price Range</h3>
        <div class="filter-group">
            <input type="number" id="min-price" placeholder="Min">
            <input type="number" id="max-price" placeholder="Max">
        </div>
        <button onclick="applyFilters()" style="width:100%; margin-top:10px; cursor:pointer; padding:10px; background:white; color:black; border:none; border-radius:8px; font-weight:bold;">Apply Filter</button>

        <h3 style="margin-top:30px;">Social</h3>
        <button class="community-btn" onclick="window.location.href='comment.html'">
            💬 Community Board
        </button>

        <p onclick="logoutUser()" style="color:#444; font-size:0.7em; text-align:center; margin-top:40px; cursor:pointer;">Reset User Session</p>
    </div>

    <div class="main">
        <input type="text" id="search-bar" placeholder="Search for unique pieces..." onkeyup="applyFilters()">
        <div class="products" id="product-list"></div>
    </div>
</div>

<div class="cart-floating" onclick="window.location.href='cart.html'">
    <span>🛒 View Your Cart</span>
    <span id="total-items-badge">0</span>
</div>

<script src="cart.js"></script>
<script src="sorting.js"></script>

<script>
    // --- USER PROFILE LOGIC ---
    function setupUserProfile() {
        const sessionData = localStorage.getItem("ghostUser");
        const nameDisplay = document.getElementById("display-username");
        const initialDisplay = document.getElementById("user-initial");

        if (sessionData) {
            const user = JSON.parse(sessionData);
            const userName = user.name || "Collector";
            nameDisplay.textContent = userName;
            // Sets the avatar to the first letter of their name
            initialDisplay.textContent = userName.charAt(0).toUpperCase();
        } else {
            nameDisplay.textContent = "Guest";
            initialDisplay.textContent = "G";
        }
    }

    function handleCategoryClick(element, category) {
        document.querySelectorAll('.category-item').forEach(item => {
            item.classList.remove('active');
        });
        element.classList.add('active');
        filterByCategory(category);
    }

    function updateBadge() {
        try {
            const cart = JSON.parse(localStorage.getItem('ghostCart')) || [];
            const totalQuantity = cart.reduce((sum, item) => sum + item.qty, 0);
            document.getElementById('total-items-badge').innerText = totalQuantity;
        } catch (e) { console.error(e); }
    }

    function addItemToCart(id, name, price) {
        if (typeof addToCart === "function") {
            addToCart({id, name, price}); 
            updateBadge(); 
        }
    }

    function logoutUser() {
        if(confirm("Do you want to clear your login info and cart?")) {
            localStorage.removeItem("ghostUser");
            localStorage.removeItem("ghostCart");
            window.location.href = "web.html";
        }
    }

    // Run setup on load
    window.addEventListener('load', () => {
        updateBadge();
        setupUserProfile();
    });
</script>

</body>
</html>
