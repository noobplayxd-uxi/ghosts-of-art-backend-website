<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure Checkout | Ghosts of Art</title>
    <style>
        body {
            font-family: 'Segoe UI', Roboto, sans-serif;
            background: radial-gradient(circle at center, #1a1a1a 0%, #000000 100%);
            background-attachment: fixed;
            color: white; margin: 0; padding: 20px;
            display: flex; justify-content: center; align-items: center; min-height: 100vh;
        }

        .checkout-box {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(20px);
            padding: 35px; border-radius: 25px;
            width: 100%; max-width: 450px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 25px 50px rgba(0,0,0,0.6);
        }

        h2 { margin: 0 0 20px; color: #00ffcc; border-bottom: 1px solid #333; padding-bottom: 15px; font-weight: 300; letter-spacing: 1px; }
        
        /* Order Summary Styling */
        .summary-item { display: flex; justify-content: space-between; margin: 10px 0; color: #888; font-size: 0.85em; }
        .total-row { display: flex; justify-content: space-between; margin: 20px 0; font-weight: bold; font-size: 1.2em; color: #fff; border-top: 1px dashed #444; padding-top: 15px; }

        label { display: block; margin: 18px 0 6px; color: #666; font-size: 0.7em; text-transform: uppercase; letter-spacing: 1.5px; }
        
        input, textarea, select {
            width: 100%; padding: 14px; border-radius: 10px; border: 1px solid #222;
            background: rgba(0,0,0,0.6); color: white; outline: none; box-sizing: border-box; 
            font-size: 0.95em; transition: 0.3s;
        }
        input:focus, select:focus { border-color: #00ffcc; background: rgba(0,0,0,0.8); }

        /* Card Section UI */
        #card-section { 
            display: block; /* Visible by default as Card is selected */
            margin-top: 25px; padding: 20px; 
            background: rgba(0, 255, 204, 0.02); 
            border-radius: 15px; border: 1px solid #222; 
        }
        .card-row { display: flex; gap: 15px; margin-top: 10px; }

        .pay-btn {
            width: 100%; padding: 18px; margin-top: 30px; border: none; border-radius: 50px;
            background: #00ffcc; color: #000; font-weight: bold; cursor: pointer;
            font-size: 1em; transition: 0.4s; text-transform: uppercase; letter-spacing: 2px;
        }
        .pay-btn:hover { background: #05d4ab; transform: translateY(-3px); box-shadow: 0 10px 20px rgba(0, 255, 204, 0.2); }
        .pay-btn:disabled { background: #1a1a1a; color: #444; cursor: not-allowed; transform: none; }
        
        .loader { display: none; color: #00ffcc; font-size: 0.8em; text-align: center; margin-top: 20px; animation: pulse 1.5s infinite; }
        
        @keyframes pulse { 0% { opacity: 0.5; } 50% { opacity: 1; } 100% { opacity: 0.5; } }
    </style>
</head>
<body>

<div class="checkout-box">
    <h2>Secure Checkout</h2>
    
    <div id="order-summary"></div>
    <div class="total-row">
        <span>Final Total</span>
        <span>₹<span id="final-total">0</span></span>
    </div>

    <form id="payment-form">
        <label>Customer Details</label>
        <input type="text" id="cust-name" placeholder="Full Name" required style="margin-bottom: 12px;">
        
        <input type="tel" id="cust-phone" placeholder="Phone Number (10 Digits)" maxlength="10" required style="margin-bottom: 12px;">
        
        <textarea id="cust-address" rows="2" placeholder="Shipping Address (Street, City, Pincode)" required></textarea>

        <label>Select Payment Method</label>
        <select id="pay-method" onchange="togglePaymentFields()">
            <option value="card" selected>Credit / Debit Card</option>
            <option value="upi">UPI (GPay / PhonePe / Paytm)</option>
        </select>

        <div id="card-section">
            <label>Card Number</label>
            <input type="text" id="card-num" placeholder="XXXX XXXX XXXX XXXX" maxlength="19">
            
            <div class="card-row">
                <div style="flex: 2;">
                    <label>Expiry</label>
                    <input type="text" id="card-exp" placeholder="MM/YY" maxlength="5">
                </div>
                <div style="flex: 1;">
                    <label>CVV</label>
                    <input type="password" id="card-cvv" placeholder="***" maxlength="3">
                </div>
            </div>
        </div>

        <button type="button" class="pay-btn" id="pay-button" onclick="startPayment()">Complete Purchase</button>
        <div class="loader" id="loading-msg">Securely verifying with bank...</div>
    </form>
</div>

<script src="checkout.js"></script>

</body>
</html>
